name: Deploy Transcriber

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop running transcriber process
        shell: cmd
        run: |
          taskkill /F /FI "WINDOWTITLE eq Execute python script on anaconda environment" >nul 2>&1
          taskkill /F /IM "python.exe" /FI "WINDOWTITLE eq Execute python script on anaconda environment" >nul 2>&1
          echo Process stopped (or was not running)

      - name: Install/update dependencies
        shell: cmd
        run: |
          C:\Users\matt.w\AppData\Local\anaconda3\envs\transcription_dev\python.exe -m pip install -r requirements.txt

      - name: Start transcriber
        shell: cmd
        run: |
          start "Execute python script on anaconda environment" cmd /c run.bat
          echo Transcriber started
